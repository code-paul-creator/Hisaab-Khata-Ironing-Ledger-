<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Hisaab Khata — Ironing Ledger</title>
<meta name="theme-color" content="#FBF7F0" />

<!-- Security hardening (see README "Security" section for full rationale):
     - No inline scripts/styles allowed from external origins
     - No framing by other sites (clickjacking protection)
     - Only this same origin and Google Fonts may be loaded
     - referrer kept minimal to avoid leaking URLs externally -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'none';" />
<meta http-equiv="X-Content-Type-Options" content="nosniff" />
<meta name="referrer" content="strict-origin-when-cross-origin" />
<meta name="description" content="A simple ledger for tracking laundry pickups, payments, and deliveries." />

<!-- PWA: installable to home screen -->
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" type="image/png" href="icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ============================================================
   Hisaab Khata — ironing/laundry ledger
   Visual world: a paper khata (ledger) book, ink stamps, laundry
   tags — warm, tactile, legible at a glance, not a SaaS dashboard.
   ============================================================ */

:root {
  --paper: #FBF7F0;
  --paper-raised: #FFFDF9;
  --ink: #2B2118;
  --ink-soft: #5C4F3F;
  --ink-faint: #8B7355;
  --line: #E3D9C8;
  --line-strong: #D4C5AC;

  --owed: #C75D3C;
  --owed-bg: #F7E6DE;
  --paid: #3E7C5A;
  --paid-bg: #E2EFE6;
  --pending: #B8862E;
  --pending-bg: #F5EBD8;

  --font-display: 'Caveat', cursive;
  --font-body: 'Inter', 'Noto Sans Devanagari', sans-serif;
  --font-hindi: 'Noto Sans Devanagari', 'Inter', sans-serif;

  --radius: 14px;
  --shadow: 0 2px 8px rgba(43, 33, 24, 0.08), 0 1px 2px rgba(43, 33, 24, 0.06);
  --shadow-raised: 0 8px 24px rgba(43, 33, 24, 0.14), 0 2px 6px rgba(43, 33, 24, 0.08);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0; padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: contain;
}

body {
  min-height: 100vh;
  padding-bottom: 100px;
}

.app-shell {
  background-image:
    repeating-linear-gradient(transparent, transparent 38px, rgba(212, 197, 172, 0.35) 39px);
  background-color: var(--paper);
  min-height: 100vh;
}

/* This is fundamentally a one-handed, on-the-go phone tool. On wider
   screens, keep it centered at a phone-like width with a visible
   "device" edge rather than stretching every element full-bleed. */
@media (min-width: 560px) {
  body { background-color: var(--line); }
  .app-shell {
    max-width: 480px;
    margin: 0 auto;
    border-left: 1px solid var(--line-strong);
    border-right: 1px solid var(--line-strong);
    box-shadow: var(--shadow-raised);
  }
  .fab {
    position: fixed;
    right: max(20px, calc(50% - 240px + 20px));
  }
}

button { font-family: inherit; }

/* ---------- Top bar ---------- */

.topbar {
  position: sticky;
  top: 0;
  z-index: 40;
  background: var(--paper);
  border-bottom: 2px solid var(--line-strong);
  padding: 14px 16px 12px;
}

.topbar-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.brand {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 30px;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 8px;
  line-height: 1;
}

.brand .stamp {
  font-size: 22px;
  transform: rotate(-8deg);
}

.lang-toggle {
  display: flex;
  background: var(--paper-raised);
  border: 1.5px solid var(--line-strong);
  border-radius: 100px;
  padding: 3px;
  gap: 2px;
}

.lang-btn {
  border: none;
  background: transparent;
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-faint);
  cursor: pointer;
  transition: all 0.15s ease;
}

.lang-btn.active {
  background: var(--ink);
  color: var(--paper);
}

.search-row {
  margin-top: 12px;
  position: relative;
}

.search-input {
  width: 100%;
  padding: 12px 16px 12px 40px;
  border-radius: var(--radius);
  border: 1.5px solid var(--line-strong);
  background: var(--paper-raised);
  font-size: 15px;
  color: var(--ink);
  font-family: var(--font-body);
}

.search-input:focus { outline: none; border-color: var(--ink-faint); }

.search-icon {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.45;
  pointer-events: none;
}

/* ---------- Summary strip ---------- */

.summary-strip {
  display: flex;
  gap: 10px;
  padding: 14px 16px 4px;
  overflow-x: auto;
}

.summary-card {
  flex: 1;
  min-width: 100px;
  background: var(--paper-raised);
  border: 1.5px solid var(--line);
  border-radius: var(--radius);
  padding: 12px 14px;
  text-align: center;
}

.summary-card .num {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  line-height: 1;
}

.summary-card.owed .num { color: var(--owed); }
.summary-card.pending .num { color: var(--pending); }
.summary-card.paid .num { color: var(--paid); }

.summary-card .lbl {
  font-size: 11px;
  color: var(--ink-faint);
  margin-top: 4px;
  font-weight: 500;
}

/* ---------- Ticket list ---------- */

.section-label {
  padding: 18px 18px 8px;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.ticket-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 0 16px;
}

.ticket {
  background: var(--paper-raised);
  border: 1.5px solid var(--line);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow);
  position: relative;
  cursor: pointer;
  transition: transform 0.1s ease, box-shadow 0.1s ease;
  /* torn-tag notch effect */
  clip-path: polygon(
    0% 4px, 4px 0%, calc(100% - 4px) 0%, 100% 4px,
    100% calc(100% - 4px), calc(100% - 4px) 100%, 4px 100%, 0% calc(100% - 4px)
  );
}

.ticket:active { transform: scale(0.985); }

.ticket.done {
  opacity: 0.6;
}

.ticket-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}

.ticket-name {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.1;
}

.ticket-name .hindi {
  font-family: var(--font-hindi);
  font-size: 16px;
  font-weight: 600;
}

.ticket-phone {
  font-size: 12.5px;
  color: var(--ink-faint);
  margin-top: 2px;
}

.ticket-items {
  font-size: 13.5px;
  color: var(--ink-soft);
  margin-top: 6px;
}

.ticket-note {
  font-size: 12.5px;
  color: var(--ink-faint);
  margin-top: 4px;
  font-style: italic;
}

.ticket-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--line-strong);
}

.pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 700;
  padding: 5px 11px;
  border-radius: 100px;
  letter-spacing: 0.01em;
}

.pill.owed { background: var(--owed-bg); color: var(--owed); }
.pill.pending-status { background: var(--pending-bg); color: var(--pending); }
.pill.paid { background: var(--paid-bg); color: var(--paid); }
.pill.done-status { background: var(--paid-bg); color: var(--paid); }

.ticket-time {
  font-size: 11.5px;
  color: var(--ink-faint);
}

.ticket-amount {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  color: var(--owed);
}

.empty-state {
  text-align: center;
  padding: 60px 30px;
  color: var(--ink-faint);
}

.empty-state .big {
  font-family: var(--font-display);
  font-size: 26px;
  color: var(--ink-soft);
  margin-bottom: 6px;
}

/* ---------- Floating add button ---------- */

.fab {
  position: fixed;
  bottom: 22px;
  right: 20px;
  width: 62px;
  height: 62px;
  border-radius: 50%;
  background: var(--owed);
  border: none;
  box-shadow: var(--shadow-raised);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 50;
  transition: transform 0.15s ease;
}

.fab:active { transform: scale(0.92); }

.fab svg { width: 28px; height: 28px; }

/* ---------- Modal / sheet ---------- */

.sheet-overlay {
  position: fixed;
  inset: 0;
  background: rgba(43, 33, 24, 0.45);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}

.sheet-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.sheet {
  background: var(--paper);
  width: 100%;
  max-width: 480px;
  border-radius: 22px 22px 0 0;
  padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
  max-height: 88vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.sheet-overlay.open .sheet { transform: translateY(0); }

.sheet-handle {
  width: 40px;
  height: 4px;
  background: var(--line-strong);
  border-radius: 100px;
  margin: 0 auto 16px;
}

.sheet-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 16px;
}

.field {
  margin-bottom: 14px;
}

.field label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-soft);
  margin-bottom: 6px;
}

.field input, .field textarea {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1.5px solid var(--line-strong);
  background: var(--paper-raised);
  font-size: 16px;
  font-family: var(--font-body);
  color: var(--ink);
}

.field input:focus, .field textarea:focus {
  outline: none;
  border-color: var(--owed);
}

.field textarea { resize: none; min-height: 60px; }

.item-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--paper-raised);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 8px;
}

.item-row-label { font-size: 14.5px; font-weight: 500; }

.stepper {
  display: flex;
  align-items: center;
  gap: 12px;
}

.stepper button {
  width: 30px; height: 30px;
  border-radius: 8px;
  border: 1.5px solid var(--line-strong);
  background: var(--paper);
  font-size: 17px;
  font-weight: 700;
  color: var(--ink);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

.stepper .count {
  min-width: 22px;
  text-align: center;
  font-weight: 700;
  font-size: 15px;
}

.toggle-row {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
}

.toggle-option {
  flex: 1;
  text-align: center;
  padding: 12px;
  border-radius: 10px;
  border: 1.5px solid var(--line-strong);
  background: var(--paper-raised);
  font-size: 14px;
  font-weight: 600;
  color: var(--ink-faint);
  cursor: pointer;
}

.toggle-option.selected.owed-style { background: var(--owed-bg); border-color: var(--owed); color: var(--owed); }
.toggle-option.selected.paid-style { background: var(--paid-bg); border-color: var(--paid); color: var(--paid); }

.amount-field { display: none; }
.amount-field.visible { display: block; }

.btn-primary {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: var(--ink);
  color: var(--paper);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 6px;
}

.btn-primary:active { opacity: 0.85; }

.btn-secondary {
  width: 100%;
  padding: 13px;
  border-radius: 12px;
  border: 1.5px solid var(--line-strong);
  background: transparent;
  color: var(--ink-faint);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
}

.btn-danger {
  color: var(--owed);
  border-color: var(--owed-bg);
}

/* ---------- Ticket detail action row ---------- */

.action-row {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}

.action-row button {
  flex: 1;
  padding: 13px;
  border-radius: 12px;
  border: 1.5px solid var(--line-strong);
  background: var(--paper-raised);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.action-row button.mark-done { background: var(--paid); border-color: var(--paid); color: white; }
.action-row button.mark-paid { background: var(--owed); border-color: var(--owed); color: white; }

/* "Stamp landing" feedback - a quick, satisfying punch when marking
   something done or paid, like an ink stamp hitting paper. Triggered
   via JS by toggling this class briefly. */
.action-row button.stamp-hit {
  animation: stamp-land 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes stamp-land {
  0% { transform: scale(1); }
  35% { transform: scale(0.88) rotate(-2deg); }
  70% { transform: scale(1.05) rotate(1deg); }
  100% { transform: scale(1) rotate(0); }
}

/* Card "settle" - when a ticket moves between Pending/Done sections,
   it briefly lifts and settles back down instead of just popping into
   the new list, so the move reads as an action, not a glitch. */
.ticket.settling {
  animation: card-settle 0.4s ease;
}

@keyframes card-settle {
  0% { transform: translateY(-6px) scale(0.98); opacity: 0.7; }
  60% { transform: translateY(2px) scale(1.01); opacity: 1; }
  100% { transform: translateY(0) scale(1); }
}
.action-row button.undone-state { background: var(--paper-raised); color: var(--ink-soft); }

/* ---------- Toast ---------- */

.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: var(--paper);
  padding: 12px 20px;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 600;
  box-shadow: var(--shadow-raised);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: all 0.25s ease;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ---------- Install banner ---------- */

.install-banner {
  margin: 14px 16px 0;
  background: var(--pending-bg);
  border: 1.5px solid var(--pending);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: none;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  font-size: 13px;
  color: var(--ink-soft);
}

.install-banner.show { display: flex; }

.install-banner button {
  background: var(--pending);
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 12.5px;
  font-weight: 700;
  white-space: nowrap;
  cursor: pointer;
}

/* ---------- Hindi text rendering ---------- */

[lang="hi"], .hindi-text {
  font-family: var(--font-hindi);
}

/* ---------- PIN lock ---------- */

.lock-overlay {
  position: fixed;
  inset: 0;
  background: var(--paper);
  z-index: 500;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px;
  text-align: center;
}

.lock-overlay.hidden { display: none; }

.lock-icon { font-size: 44px; margin-bottom: 6px; }

.lock-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 6px;
}

.lock-sub {
  font-size: 13.5px;
  color: var(--ink-faint);
  margin-bottom: 22px;
  max-width: 280px;
}

.pin-dots {
  display: flex;
  gap: 16px;
  margin-bottom: 26px;
}

.pin-dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 2px solid var(--line-strong);
  background: transparent;
  transition: all 0.15s ease;
}

.pin-dot.filled {
  background: var(--owed);
  border-color: var(--owed);
}

.pin-dot.shake-error {
  animation: pin-shake 0.4s ease;
  border-color: var(--owed);
}

@keyframes pin-shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.pin-keypad {
  display: grid;
  grid-template-columns: repeat(3, 64px);
  gap: 14px;
  margin-bottom: 16px;
}

.pin-key {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: 1.5px solid var(--line-strong);
  background: var(--paper-raised);
  font-size: 22px;
  font-weight: 600;
  color: var(--ink);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.pin-key:active { background: var(--line); }

.pin-key.empty { visibility: hidden; pointer-events: none; }

.pin-error-msg {
  font-size: 13px;
  color: var(--owed);
  font-weight: 600;
  min-height: 18px;
  margin-bottom: 8px;
}

.lock-footer-link {
  font-size: 12.5px;
  color: var(--ink-faint);
  text-decoration: underline;
  cursor: pointer;
  margin-top: 10px;
  background: none;
  border: none;
}

/* ---------- Blurred sensitive fields ---------- */

.sensitive {
  cursor: pointer;
  position: relative;
}

.sensitive.blurred {
  filter: blur(5px);
  user-select: none;
}

.sensitive.blurred::after {
  content: "🔒";
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  filter: none;
  font-size: 12px;
}

/* ---------- Export / settings row ---------- */

.utility-row {
  display: flex;
  gap: 8px;
  padding: 4px 16px 0;
}

.utility-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 9px 10px;
  border-radius: 10px;
  border: 1.5px solid var(--line-strong);
  background: var(--paper-raised);
  font-size: 12.5px;
  font-weight: 600;
  color: var(--ink-soft);
  cursor: pointer;
}

.utility-btn:active { background: var(--line); }

/* ---------- Onboarding PIN setup ---------- */

.setup-skip {
  margin-top: 18px;
  font-size: 13px;
  color: var(--ink-faint);
  text-decoration: underline;
  background: none;
  border: none;
  cursor: pointer;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ---------- Focus visibility ---------- */

button:focus-visible, input:focus-visible, textarea:focus-visible {
  outline: 2.5px solid var(--owed);
  outline-offset: 2px;
}
</style>
</head>
<body>

<!-- PIN lock screen - shown when re-authentication is required to view
     sensitive fields (phone numbers, amounts). The app's main list still
     works underneath without unlocking; this only gates sensitive data. -->
<div class="lock-overlay hidden" id="lockOverlay">
  <div class="lock-icon">🔒</div>
  <div class="lock-title" id="lockTitle" data-i18n="lockTitle">PIN डालें</div>
  <div class="lock-sub" id="lockSub" data-i18n="lockSub">फ़ोन नंबर और राशि देखने के लिए</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-error-msg" id="pinErrorMsg"></div>
  <div class="pin-keypad" id="pinKeypad"></div>
  <button class="lock-footer-link" id="forgotPinBtn" data-i18n="forgotPin">PIN भूल गए?</button>
</div>

<!-- First-run PIN setup sheet -->
<div class="sheet-overlay" id="setupOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" data-i18n="setupTitle">PIN सेट करें</div>
    <p style="font-size: 13.5px; color: var(--ink-soft); margin-bottom: 18px; line-height: 1.5;" data-i18n="setupExplain">
      यह PIN फ़ोन नंबर और पैसों की जानकारी को सुरक्षित रखेगा। इसे याद रखें।
    </p>
    <div class="pin-dots" id="setupPinDots" style="justify-content:center;">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-error-msg" id="setupErrorMsg" style="text-align:center;"></div>
    <div class="pin-keypad" id="setupKeypad" style="margin: 0 auto 16px;"></div>
    <button class="setup-skip" id="skipPinSetupBtn" data-i18n="skipPinSetup">अभी के लिए छोड़ें</button>
  </div>
</div>

<div class="app-shell">
<div class="topbar">
  <div class="topbar-row">
    <div class="brand"><span class="stamp">🧺</span> <span data-i18n="brandName">Hisaab Khata</span></div>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="hi" id="langHi">हिं</button>
      <button class="lang-btn" data-lang="en" id="langEn">EN</button>
    </div>
  </div>
  <div class="search-row">
    <span class="search-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </span>
    <input type="text" class="search-input" id="searchInput" data-i18n-placeholder="searchPlaceholder" placeholder="नाम या फ़ोन नंबर खोजें…" />
  </div>
  <div class="install-banner" id="installBanner">
    <span data-i18n="installPrompt">इसे होम स्क्रीन पर लगाएं — ऐप जैसा खुलेगा</span>
    <button id="installBtn" data-i18n="installBtn">लगाएं</button>
  </div>
</div>

<div class="utility-row">
  <button class="utility-btn" id="exportNowBtn">
    📊 <span data-i18n="exportNow">रिकॉर्ड डाउनलोड करें</span>
  </button>
  <button class="utility-btn" id="lockNowBtn">
    🔒 <span data-i18n="lockNow">लॉक करें</span>
  </button>
</div>

<div class="summary-strip">
  <div class="summary-card owed">
    <div class="num" id="summaryOwedCount">0</div>
    <div class="lbl" data-i18n="summaryOwed">पैसे बाकी</div>
  </div>
  <div class="summary-card pending">
    <div class="num" id="summaryPendingCount">0</div>
    <div class="lbl" data-i18n="summaryPending">कपड़े बाकी</div>
  </div>
  <div class="summary-card paid">
    <div class="num" id="summaryDoneCount">0</div>
    <div class="lbl" data-i18n="summaryDoneToday">आज पूरा हुआ</div>
  </div>
</div>

<div class="section-label" data-i18n="sectionPending">बाकी काम</div>
<div class="ticket-list" id="pendingList"></div>

<div class="section-label" data-i18n="sectionDone">पूरा हुआ</div>
<div class="ticket-list" id="doneList"></div>

<button class="fab" id="fabAdd" aria-label="Add new entry">
  <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.6" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>
</div>

<!-- Add / Edit ticket sheet -->
<div class="sheet-overlay" id="sheetOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle" data-i18n="newEntryTitle">नई एंट्री</div>

    <div class="field">
      <label data-i18n="fieldName">ग्राहक का नाम</label>
      <input type="text" id="inputName" data-i18n-placeholder="fieldNamePlaceholder" placeholder="जैसे: शर्मा जी" autocomplete="off" />
    </div>

    <div class="field">
      <label data-i18n="fieldPhone">फ़ोन नंबर</label>
      <input type="tel" id="inputPhone" placeholder="98765 43210" autocomplete="off" />
    </div>

    <div class="field">
      <label data-i18n="fieldItems">कपड़े (गिनती)</label>
      <div id="itemStepperList"></div>
    </div>

    <div class="field">
      <label data-i18n="fieldNote">पहचान के लिए नोट (वैकल्पिक)</label>
      <textarea id="inputNote" data-i18n-placeholder="fieldNotePlaceholder" placeholder="जैसे: नीली पट्टी वाली सफ़ेद शर्ट"></textarea>
    </div>

    <div class="field">
      <label data-i18n="fieldPayment">पैसे की स्थिति</label>
      <div class="toggle-row">
        <div class="toggle-option owed-style selected" id="paymentPendingBtn" data-i18n="paymentPending">बाकी है</div>
        <div class="toggle-option paid-style" id="paymentPaidBtn" data-i18n="paymentPaid">मिल गया</div>
      </div>
      <div class="amount-field visible" id="amountField">
        <input type="number" inputmode="numeric" id="inputAmount" data-i18n-placeholder="fieldAmountPlaceholder" placeholder="₹ राशि (वैकल्पिक)" />
      </div>
    </div>

    <button class="btn-primary" id="saveTicketBtn" data-i18n="saveBtn">सेव करें</button>
    <button class="btn-secondary" id="cancelSheetBtn" data-i18n="cancelBtn">रद्द करें</button>
  </div>
</div>

<!-- Ticket detail sheet -->
<div class="sheet-overlay" id="detailOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div id="detailContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="vendor/xlsx.full.min.js"></script>
<script src="app.js"></script>
</body>
</html>
